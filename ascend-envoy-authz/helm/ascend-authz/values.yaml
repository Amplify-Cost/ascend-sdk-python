# ASCEND ext_authz Helm Chart Values
# Author: ASCEND Platform Engineering

# Number of replicas (minimum 3 for HA)
replicaCount: 3

image:
  repository: owkai/ascend-envoy-authz
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ASCEND Platform Configuration
ascend:
  # API URL (required)
  apiUrl: "https://pilot.owkai.app"
  # API Key - provide via --set or external secret
  apiKey: ""
  # Use existing secret for API key
  existingSecret: ""
  existingSecretKey: "api_key"

# Agent ID Configuration
agentId:
  header: "x-ascend-agent-id"
  defaultValue: ""
  required: true

# Behavior Configuration
behavior:
  # FAIL SECURE: deny on error (strongly recommended)
  failOpen: false
  # Block requests pending approval
  blockOnPending: true
  # Environment label
  environment: "production"
  # Data sensitivity level
  dataSensitivity: "standard"

# Performance Configuration
performance:
  timeout: "5s"
  retryCount: 2
  retryDelay: "100ms"
  cacheTTL: "60s"

# Circuit Breaker Configuration
circuitBreaker:
  enabled: true
  threshold: 5
  resetTimeout: "30s"

# Logging Configuration
logging:
  level: "info"
  format: "json"
  logDecisions: true

# Path Exclusions (bypass governance)
excludedPaths:
  - "/health"
  - "/ready"
  - "/metrics"
  - "/healthz"
  - "/readyz"

# Service Configuration
service:
  type: ClusterIP
  port: 50051
  metricsPort: 8080

# Resource Limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Autoscaling Configuration
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Pod Security Context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Container Security Context
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Service Account
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Node Selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity (anti-affinity by default)
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ascend-authz
          topologyKey: kubernetes.io/hostname

# Topology Spread Constraints
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: ascend-authz

# Istio Integration
istio:
  # Create extension provider config
  extensionProvider:
    enabled: true
    name: "ascend-ext-authz"
    timeout: "5s"
    failOpen: false

  # Create sample AuthorizationPolicy
  authorizationPolicy:
    enabled: false
    # Namespaces to create policies in
    namespaces: []
    # Pod selector labels
    selector:
      ascend.io/governed: "true"
    # Paths to govern
    paths: ["/*"]
    # Paths to exclude
    notPaths: ["/health", "/ready", "/metrics"]

# Prometheus ServiceMonitor
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
