# pytest.ini - ASCEND Platform Test Configuration
# P0.1: Launch Critical - Code Coverage Enabled
# Updated: 2025-12-09

[pytest]
# Verbose output with coverage reporting
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=sdk/ascend-sdk-python/ascend
    --cov=services
    --cov=routes
    --cov=policy_engine
    --cov-report=term-missing
    --cov-report=html:coverage_html
    --cov-report=xml:coverage.xml
    --cov-fail-under=70

# Test discovery paths
testpaths =
    tests
    sdk/ascend-sdk-python/tests

# Python path for imports
pythonpath = .

# Async mode for pytest-asyncio
asyncio_mode = auto

# Timeout for individual tests (seconds)
timeout = 30

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may require services)
    sdk: SDK-specific tests
    security: Security-related tests
    performance: Performance/latency tests
    slow: Tests that take > 5 seconds
    fail_secure: FAIL SECURE behavior tests (P1-001)
    session_revocation: Session revocation tests (P1-001)
    redis_monitoring: Redis HA monitoring tests (P1-002)

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::PendingDeprecationWarning
