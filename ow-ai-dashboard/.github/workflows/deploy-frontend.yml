name: Deploy Frontend to ECS

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'ow-ai-dashboard/**'

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: owkai-pilot-frontend
  ECS_SERVICE: owkai-pilot-frontend-service
  ECS_CLUSTER: owkai-pilot

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::110948415588:role/GitHubActionsRole
        role-session-name: Frontend-Deploy-${{ github.run_id }}
        aws-region: us-east-2

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push Docker image
      working-directory: ./ow-ai-dashboard
      run: |
        # Create ECR repository if it doesn't exist
        aws ecr describe-repositories --repository-names $ECR_REPOSITORY || \
        aws ecr create-repository --repository-name $ECR_REPOSITORY

        # Get registry URL
        ECR_REGISTRY=$(aws ecr describe-repositories --repository-names $ECR_REPOSITORY --query 'repositories[0].repositoryUri' --output text | cut -d'/' -f1)
        
        # Build with API URL
        docker build \
          --build-arg VITE_API_URL=${{ vars.VITE_API_URL }} \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
        
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
        
        echo "IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}" >> $GITHUB_ENV

    - name: Create ECS task definition
      run: |
        cat > task-definition.json << EOF
        {
          "family": "owkai-pilot-frontend",
          "networkMode": "awsvpc",
          "requiresCompatibilities": ["FARGATE"],
          "cpu": "256",
          "memory": "512",
          "executionRoleArn": "arn:aws:iam::110948415588:role/owkai-pilot-ecs-task-execution-role",
          "taskRoleArn": "arn:aws:iam::110948415588:role/owkai-pilot-ecs-task-role",
          "containerDefinitions": [
            {
              "name": "frontend",
              "image": "${{ env.IMAGE_URI }}",
              "portMappings": [
                {
                  "containerPort": 80,
                  "protocol": "tcp"
                }
              ],
              "essential": true,
              "logConfiguration": {
                "logDriver": "awslogs",
                "options": {
                  "awslogs-group": "/ecs/owkai-pilot-frontend",
                  "awslogs-region": "us-east-2",
                  "awslogs-stream-prefix": "ecs"
                }
              }
            }
          ]
        }
        EOF

    - name: Deploy to ECS
      run: |
        aws ecs register-task-definition --cli-input-json file://task-definition.json
        
        aws ecs update-service \
          --cluster $ECS_CLUSTER \
          --service $ECS_SERVICE \
          --task-definition owkai-pilot-frontend \
          --force-new-deployment
        
        aws ecs wait services-stable \
          --cluster $ECS_CLUSTER \
          --services $ECS_SERVICE
