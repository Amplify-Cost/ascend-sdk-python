name: Deploy Frontend to AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: 110948415588.dkr.ecr.us-east-2.amazonaws.com
  ECR_REPOSITORY: owkai-pilot-frontend
  ECS_SERVICE: owkai-pilot-frontend-service
  ECS_CLUSTER: owkai-pilot
  ECS_TASK_DEFINITION: owkai-pilot-frontend
  CONTAINER_NAME: frontend

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::110948415588:role/GitHubActionsRole
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Force Build Cache Invalidation
      run: |
        echo "BUILD_TIMESTAMP=$(date +%s)" >> $GITHUB_ENV
        echo "BUILD_HASH=$(echo '${{ github.sha }}' | cut -c1-8)" >> $GITHUB_ENV
        echo "FORCE_REBUILD=true" >> $GITHUB_ENV
    - name: Force Build Cache Invalidation
      run: |
        echo "BUILD_TIMESTAMP=$(date +%s)" >> $GITHUB_ENV
        echo "BUILD_HASH=$(echo '${{ github.sha }}' | cut -c1-8)" >> $GITHUB_ENV
        echo "FORCE_REBUILD=true" >> $GITHUB_ENV
    - name: Build Docker image
      id: build-image
      run: |
        IMAGE_TAG=${{ github.sha }}
        docker build --no-cache -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Download task definition
      run: |
        aws ecs describe-task-definition --task-definition $ECS_TASK_DEFINITION --query taskDefinition > task-definition.json

    - name: Update task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy to Amazon ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
