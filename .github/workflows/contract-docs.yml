# SEC-REL-001 — Doc/SDK Contract Test (L2 GitHub Actions)
#
# Runs on every PR that touches the Python SDK source, the docs source,
# or the READMEs/CHANGELOGs that ship code examples. Fetches the docs
# source from the sibling frontend repo at a pinned SHA.
#
# Rollout phase: ADVISORY (silent-run). `continue-on-error: true` on the
# required-check step so the gate reports its findings on PRs without
# blocking merges. Flip to blocking by setting CONTRACT_GATE_BLOCKING=true
# or removing continue-on-error once BUG-16 references are cleared by
# the SDK 2.3.1 release.

name: contract/docs-sdk
on:
  pull_request:
    paths:
      - "ascend/**"
      - "README.md"
      - "CHANGELOG.md"
      - "tests/contracts/**"
      - ".github/workflows/contract-docs.yml"
  workflow_dispatch:
    inputs:
      docs_ref:
        description: "Override docs SHA (default: main)"
        required: false
        default: "main"

permissions:
  contents: read
  pull-requests: write

jobs:
  contract-test:
    name: Doc/SDK Contract (advisory)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SDK canonical
        uses: actions/checkout@v4
        with:
          path: sdk

      - name: Checkout docs canonical (cross-repo via GitHub App)
        uses: actions/checkout@v4
        with:
          repository: Amplify-Cost/owkai-pilot-frontend
          path: frontend
          ref: ${{ github.event.inputs.docs_ref || 'main' }}
          token: ${{ secrets.ASCEND_CONTRACT_GATE_TOKEN }}

      - name: Checkout backend canonical (Node SDK surface source)
        uses: actions/checkout@v4
        with:
          repository: Amplify-Cost/owkai-pilot-backend
          path: backend
          ref: master
          token: ${{ secrets.ASCEND_CONTRACT_GATE_TOKEN }}

      - name: Assemble monorepo layout the runner expects
        run: |
          set -euo pipefail
          mkdir -p monorepo
          mv sdk/* sdk/.* monorepo/ 2>/dev/null || true
          mv frontend monorepo/owkai-pilot-frontend
          mv backend monorepo/ow-ai-backend
          mkdir -p monorepo/ascend-audit
          : > monorepo/ascend-audit/contract-tests.jsonl

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install runner dependencies (hash-pinned)
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r monorepo/tests/contracts/requirements.lock

      - name: Install SDK for runtime import
        working-directory: monorepo
        run: pip install -e .

      - name: Run contract gate (advisory phase)
        id: gate
        continue-on-error: true
        working-directory: monorepo
        env:
          CONTRACT_GATE_PHASE: advisory
        run: |
          set +e
          python -m tests.contracts.runner \
            --json-out /tmp/contract-report.json \
            --md-out /tmp/contract-report.md \
            --trigger "gha-pr-${GITHUB_PR_NUMBER:-unknown}" \
            --no-audit
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Publish report to PR
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: contract-report
          path: |
            /tmp/contract-report.json
            /tmp/contract-report.md

      - name: Comment report summary on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -f /tmp/contract-report.md ]; then
            {
              echo "### SEC-REL-001 Contract Test (advisory)"
              echo ""
              echo "Exit code: ${{ steps.gate.outputs.exit_code }}"
              echo ""
              head -60 /tmp/contract-report.md
            } > /tmp/pr-comment.md
            gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/pr-comment.md || true
          fi

      - name: Append to audit ledger
        if: always()
        env:
          AUDIT_APP_KEY: ${{ secrets.ASCEND_AUDIT_BOT_KEY }}
        run: |
          # Audit ledger push delegated to ascend-audit-bot GitHub App.
          # See ascend-audit/BOT_IDENTITY.md for the spec.
          # In advisory phase, log locally only. Blocking phase will
          # require the bot's installation token to push to the audit repo.
          echo "SEC-REL-001: audit ledger append deferred to ascend-audit-bot (phase: advisory)"

      # When advisory → blocking, remove continue-on-error above and
      # uncomment the following step:
      # - name: Fail PR on contract violation (blocking phase)
      #   if: steps.gate.outputs.exit_code != '0'
      #   run: exit "${{ steps.gate.outputs.exit_code }}"
