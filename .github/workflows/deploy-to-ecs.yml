name: Deploy to ECS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: owkai-pilot-backend
  ECS_SERVICE: owkai-pilot-backend-service
  ECS_CLUSTER: owkai-pilot
  ECS_TASK_DEFINITION: owkai-pilot-backend
  CONTAINER_NAME: backend

jobs:
  deploy:
    name: Deploy Enterprise Backend
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Download current task definition
      run: |
        aws ecs describe-task-definition --task-definition $ECS_TASK_DEFINITION --query taskDefinition > task-definition.json

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: false

    - name: Verify deployment started
      run: |
        echo "Deployment initiated. Service will stabilize shortly."
        aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --query 'services[0].deployments[0].status'


    - name: Create CloudWatch Log Group for Migrations
      run: |
        aws logs create-log-group --log-group-name /ecs/owkai-pilot-migration --region ${{ env.AWS_REGION }} || echo "Log group already exists"

    - name: Run Database Migration
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Update migration task definition with current image
        sed "s|PLACEHOLDER_IMAGE|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" migration-task-definition.json > migration-task-def-updated.json
        
        # Register migration task definition
        MIGRATION_TASK_DEF=$(aws ecs register-task-definition --cli-input-json file://migration-task-def-updated.json --query 'taskDefinition.taskDefinitionArn' --output text)
        
        # Execute migration
        MIGRATION_TASK=$(aws ecs run-task \
          --cluster owkai-pilot \
          --task-definition "$MIGRATION_TASK_DEF" \
          --launch-type FARGATE \
          --network-configuration "awsvpcConfiguration={subnets=[subnet-0a13742578005734f,subnet-0bddeeb5ae9b6b856],securityGroups=[sg-0a9f384c088f3a9e9],assignPublicIp=ENABLED}" \
          --query 'tasks[0].taskArn' --output text)
        
        # Wait for migration completion
        aws ecs wait tasks-stopped --cluster owkai-pilot --tasks "$MIGRATION_TASK"
        
        # Check migration result
        EXIT_CODE=$(aws ecs describe-tasks --cluster owkai-pilot --tasks "$MIGRATION_TASK" --query 'tasks[0].containers[0].exitCode' --output text)
        if [ "$EXIT_CODE" != "0" ]; then
          echo "Migration failed with exit code: $EXIT_CODE"
          exit 1
        fi
        
        echo "Database migration completed successfully"
