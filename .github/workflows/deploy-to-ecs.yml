name: Deploy to ECS

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

# CRITICAL: OIDC requires id-token permission
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: owkai-pilot-backend
  ECS_SERVICE: owkai-pilot-backend-service
  ECS_CLUSTER: owkai-pilot
  ECS_TASK_DEFINITION: owkai-pilot-backend
  CONTAINER_NAME: backend

jobs:
  deploy:
    name: Deploy Enterprise Backend
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker pull --platform linux/amd64 python:3.11-slim
        # 🏢 ENTERPRISE: Pass commit SHA for deployment verification
        docker build --no-cache --pull --platform linux/amd64 \
          --build-arg COMMIT_SHA=${{ github.sha }} \
          --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Download current task definition
      run: |
        aws ecs describe-task-definition --task-definition $ECS_TASK_DEFINITION --query taskDefinition > task-definition.json

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    - name: Wait for deployment to stabilize
      run: |
        echo "⏳ Waiting 60 seconds for new containers to fully initialize..."
        sleep 60

    - name: Verify deployment health
      run: |
        echo "🔍 ENTERPRISE DEPLOYMENT VERIFICATION"
        echo "======================================"
        echo "Expected Commit: ${{ github.sha }}"
        echo ""

        # Test 1: Verify backend is responding (via /api path)
        echo "Test 1: Backend API accessibility..."
        API_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://pilot.owkai.app/api/agent-activity)

        if [ "$API_RESPONSE" = "401" ] || [ "$API_RESPONSE" = "403" ] || [ "$API_RESPONSE" = "200" ]; then
          echo "✅ Backend API accessible (HTTP $API_RESPONSE)"
        else
          echo "❌ Backend API not responding correctly (HTTP $API_RESPONSE)"
          exit 1
        fi

        echo ""

        # 🏢 ENTERPRISE: Test 2 - CRITICAL: Verify deployed commit matches expected
        echo "Test 2: Verify deployed commit SHA (PREVENTS STALE CODE)..."
        DEPLOYMENT_INFO=$(curl -s https://pilot.owkai.app/api/deployment-info 2>/dev/null || echo "{}")
        DEPLOYED_COMMIT=$(echo "$DEPLOYMENT_INFO" | jq -r '.commit_sha' 2>/dev/null || echo "unknown")
        BUILD_DATE=$(echo "$DEPLOYMENT_INFO" | jq -r '.build_date' 2>/dev/null || echo "unknown")

        echo "Deployed commit: $DEPLOYED_COMMIT"
        echo "Build date: $BUILD_DATE"

        if [ "$DEPLOYED_COMMIT" = "${{ github.sha }}" ]; then
          echo "✅ COMMIT VERIFIED - Correct code version is running!"
        elif [ "$DEPLOYED_COMMIT" = "unknown" ]; then
          echo "⚠️  Commit SHA not available (first deployment with verification)"
          echo "Note: Future deployments will verify commit SHA"
        else
          echo "❌ CRITICAL: STALE CODE DETECTED!"
          echo "Expected: ${{ github.sha }}"
          echo "Deployed: $DEPLOYED_COMMIT"
          echo ""
          echo "Forcing new deployment to pull correct image..."
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --force-new-deployment
          echo "Waiting 90 seconds for new container..."
          sleep 90

          # Re-verify
          DEPLOYMENT_INFO=$(curl -s https://pilot.owkai.app/api/deployment-info 2>/dev/null || echo "{}")
          DEPLOYED_COMMIT=$(echo "$DEPLOYMENT_INFO" | jq -r '.commit_sha' 2>/dev/null || echo "unknown")

          if [ "$DEPLOYED_COMMIT" = "${{ github.sha }}" ]; then
            echo "✅ COMMIT VERIFIED after force deployment!"
          else
            echo "❌ DEPLOYMENT FAILED - Still showing stale code"
            exit 1
          fi
        fi

        echo ""
        echo "======================================"
        echo "✅ DEPLOYMENT VERIFIED - Correct code version running"
        echo "======================================"

    - name: Deployment success notification
      if: success()
      run: |
        echo "🎉 ENTERPRISE DEPLOYMENT SUCCESS"
        echo "Commit: ${{ github.sha }}"
        echo "Environment: production"
        echo "Deployment verified: All health checks passed"
        echo "Next: Monitor CloudWatch logs for 🔍 DEPLOYMENT DEBUG messages"

    - name: Deployment failure rollback
      if: failure()
      run: |
        echo "⚠️ DEPLOYMENT VERIFICATION FAILED - Initiating rollback"
        echo "Previous task definition will continue running"
        echo "Manual intervention required to diagnose issue"
        exit 1
