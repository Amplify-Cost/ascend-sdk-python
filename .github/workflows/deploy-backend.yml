name: Deploy Backend to ECS

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'ow-ai-backend/**'

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: owkai-pilot-backend
  ECS_SERVICE: owkai-pilot-backend-service
  ECS_CLUSTER: owkai-pilot

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::110948415588:role/GitHubActionsRole
        role-session-name: Backend-Deploy-${{ github.run_id }}
        aws-region: us-east-2

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push Docker image
      working-directory: ./ow-ai-backend
      run: |
        aws ecr describe-repositories --repository-names $ECR_REPOSITORY || \
        aws ecr create-repository --repository-name $ECR_REPOSITORY
        
        ECR_REGISTRY=$(aws ecr describe-repositories --repository-names $ECR_REPOSITORY --query 'repositories[0].repositoryUri' --output text | cut -d'/' -f1)
        
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
        
        echo "IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}" >> $GITHUB_ENV

    - name: Create ECS task definition
      run: |
        cat > task-definition.json << EOF
        {
          "family": "owkai-pilot-backend",
          "networkMode": "awsvpc",
          "requiresCompatibilities": ["FARGATE"],
          "cpu": "512",
          "memory": "1024",
          "executionRoleArn": "arn:aws:iam::110948415588:role/owkai-pilot-ecs-task-execution-role",
          "taskRoleArn": "arn:aws:iam::110948415588:role/owkai-pilot-ecs-task-role",
          "containerDefinitions": [
            {
              "name": "backend",
              "image": "${{ env.IMAGE_URI }}",
              "portMappings": [
                {
                  "containerPort": 8000,
                  "protocol": "tcp"
                }
              ],
              "essential": true,
              "logConfiguration": {
                "logDriver": "awslogs",
                "options": {
                  "awslogs-group": "/ecs/owkai-pilot-backend",
                  "awslogs-region": "us-east-2",
                  "awslogs-stream-prefix": "ecs"
                }
              },
              "secrets": [
                {
                  "name": "DB_URL",
                  "valueFrom": "/owkai/pilot/backend/DB_URL"
                },
                {
                  "name": "JWT_SECRET",
                  "valueFrom": "/owkai/pilot/backend/JWT_SECRET"
                }
              ]
            }
          ]
        }
        EOF

    - name: Deploy to ECS with service creation
      run: |
        aws ecs register-task-definition --cli-input-json file://task-definition.json
        
        if aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --query 'services[0].serviceName' --output text 2>/dev/null | grep -q $ECS_SERVICE; then
          echo "Service exists, updating..."
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition owkai-pilot-backend \
            --force-new-deployment
        else
          echo "Creating service..."
          aws ecs create-service \
            --cluster $ECS_CLUSTER \
            --service-name $ECS_SERVICE \
            --task-definition owkai-pilot-backend \
            --desired-count 1 \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-0bddeeb5ae9b6b856,subnet-0a13742578005734f],securityGroups=[sg-0a9f384c088f3a9e9],assignPublicIp=DISABLED}" \
            --load-balancers "targetGroupArn=arn:aws:elasticloadbalancing:us-east-2:110948415588:targetgroup/owkai-pilot-backend-tg/f36c394e1d527ae0,containerName=backend,containerPort=8000"
        fi
        
        aws ecs wait services-stable \
          --cluster $ECS_CLUSTER \
          --services $ECS_SERVICE
