name: Deploy Backend to ECS

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]
    paths:
      - 'ow-ai-backend/**'  # Only run when backend code changes

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: owkai-pilot-backend
  ECS_SERVICE: owkai-pilot-backend-service
  ECS_CLUSTER: owkai-pilot

permissions:
  id-token: write   # Required for secure AWS connection
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials (secure OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::110948415588:role/GitHubActionsRole
        role-session-name: Backend-Deploy-${{ github.run_id }}
        aws-region: us-east-2

    - name: Login to Amazon ECR (container registry)
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push Docker image
      working-directory: ./ow-ai-backend
      run: |
        # Create container registry if it doesn't exist
        aws ecr describe-repositories --repository-names $ECR_REPOSITORY || \
        aws ecr create-repository --repository-name $ECR_REPOSITORY

        # Get registry URL
        ECR_REGISTRY=$(aws ecr describe-repositories --repository-names $ECR_REPOSITORY --query 'repositories[0].repositoryUri' --output text | cut -d'/' -f1)
        
        # Build container with unique tag
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
        
        # Push to AWS container registry
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
        
        echo "IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}" >> $GITHUB_ENV

    - name: Create ECS task definition
      run: |
        cat > task-definition.json << EOF
        {
          "family": "owkai-pilot-backend",
          "networkMode": "awsvpc",
          "requiresCompatibilities": ["FARGATE"],
          "cpu": "512",
          "memory": "1024",
          "executionRoleArn": "arn:aws:iam::110948415588:role/owkai-pilot-ecs-task-execution-role",
          "taskRoleArn": "arn:aws:iam::110948415588:role/owkai-pilot-ecs-task-role",
          "containerDefinitions": [
            {
              "name": "backend",
              "image": "${{ env.IMAGE_URI }}",
              "portMappings": [
                {
                  "containerPort": 8000,
                  "protocol": "tcp"
                }
              ],
              "essential": true,
              "logConfiguration": {
                "logDriver": "awslogs",
                "options": {
                  "awslogs-group": "/ecs/owkai-pilot-backend",
                  "awslogs-region": "us-east-2",
                  "awslogs-stream-prefix": "ecs"
                }
              },
              "secrets": [
                {
                  "name": "DB_URL",
                  "valueFrom": "/owkai/pilot/backend/DB_URL"
                },
                {
                  "name": "JWT_SECRET",
                  "valueFrom": "/owkai/pilot/backend/JWT_SECRET"
                }
              ]
            }
          ]
        }
        EOF

   - name: Deploy to ECS with Enterprise Error Handling
      run: |
        # Register new task definition (always required)
        echo "📋 Registering new task definition..."
        TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file://task-definition.json --query 'taskDefinition.taskDefinitionArn' --output text)
        echo "✅ Task definition registered: $TASK_DEF_ARN"
        
        # Enterprise approach: Check if service exists before attempting operations
        echo "🔍 Checking if ECS service exists..."
        SERVICE_EXISTS=$(aws ecs describe-services \
          --cluster $ECS_CLUSTER \
          --services $ECS_SERVICE \
          --query 'length(services[?serviceName==`'"$ECS_SERVICE"'`])' \
          --output text 2>/dev/null || echo "0")
        
        if [ "$SERVICE_EXISTS" -gt "0" ]; then
          echo "🔄 Service exists. Performing zero-downtime update..."
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition owkai-pilot-backend \
            --force-new-deployment \
            --deployment-configuration "maximumPercent=200,minimumHealthyPercent=100"
          
          echo "⏳ Waiting for deployment to stabilize..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --cli-read-timeout 600 \
            --cli-connect-timeout 60
            
        else
          echo "🆕 Service doesn't exist. Creating new service with enterprise configuration..."
          
          # Get subnet and security group information from infrastructure
          PRIVATE_SUBNETS=$(aws ec2 describe-subnets \
            --filters "Name=tag:Name,Values=owkai-pilot-private-*" \
            --query 'Subnets[].SubnetId' \
            --output text | tr '\t' ',')
          
          SECURITY_GROUP=$(aws ec2 describe-security-groups \
            --filters "Name=tag:Name,Values=owkai-pilot-ecs-sg" \
            --query 'SecurityGroups[0].GroupId' \
            --output text)
          
          BACKEND_TARGET_GROUP=$(aws elbv2 describe-target-groups \
            --names owkai-pilot-backend-tg \
            --query 'TargetGroups[0].TargetGroupArn' \
            --output text)
          
          echo "🔧 Network configuration - Subnets: $PRIVATE_SUBNETS, Security Group: $SECURITY_GROUP"
          
          # Create service with enterprise-grade configuration
          aws ecs create-service \
            --cluster $ECS_CLUSTER \
            --service-name $ECS_SERVICE \
            --task-definition owkai-pilot-backend \
            --desired-count 2 \
            --launch-type FARGATE \
            --platform-version LATEST \
            --deployment-configuration "maximumPercent=200,minimumHealthyPercent=100,deploymentCircuitBreaker={enable=true,rollback=true}" \
            --network-configuration "awsvpcConfiguration={subnets=[$PRIVATE_SUBNETS],securityGroups=[$SECURITY_GROUP],assignPublicIp=DISABLED}" \
            --load-balancers "targetGroupArn=$BACKEND_TARGET_GROUP,containerName=backend,containerPort=8000" \
            --health-check-grace-period-seconds 300 \
            --enable-execute-command \
            --tags "key=Environment,value=pilot" "key=Application,value=OW-KAI" "key=Component,value=Backend"
          
          echo "⏳ Waiting for new service to become stable..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --cli-read-timeout 900 \
            --cli-connect-timeout 60
        fi
        
        # Enterprise monitoring: Output service status and health
        echo "📊 Final service status:"
        aws ecs describe-services \
          --cluster $ECS_CLUSTER \
          --services $ECS_SERVICE \
          --query 'services[0].{Name:serviceName,Status:status,RunningCount:runningCount,DesiredCount:desiredCount,TaskDefinition:taskDefinition}'
        
        # Check load balancer target health
        echo "🎯 Load balancer target health:"
        aws elbv2 describe-target-health \
          --target-group-arn $BACKEND_TARGET_GROUP \
          --query 'TargetHealthDescriptions[].{Target:Target.Id,Health:TargetHealth.State,Description:TargetHealth.Description}'
